<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>推广利润工具（云端实时同步版）</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<style>
body { font-family:"Microsoft YaHei", sans-serif; margin:20px;}
#controls { margin-bottom:10px;}
button { margin-right:5px; }
table { border-collapse:collapse; width:100%; table-layout:fixed; transition: all 0.2s; }
th, td { border:1px solid #ccc; padding:5px; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; position:relative;}
th .resizer { position:absolute; right:0; top:0; width:5px; cursor:col-resize; user-select:none; height:100%; }
.group { background:#f0f0f0; cursor:pointer; font-weight:bold; }
.profit { color:green; }
.loss { color:red; }
.remark { background:#ffffe0; font-style:italic; color:blue; text-align:left; }
#contextMenu { position:absolute; display:none; list-style:none; padding:5px; background:#fff; border:1px solid #ccc; }
#contextMenu li { padding: 2px 10px; cursor:pointer; }
#contextMenu li:hover { background:#eee; }
</style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <button onclick="clearData()">清空数据</button>
    <button onclick="exportExcel()">导出结果</button>
</div>

<table id="dataTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
</table>

<ul id="contextMenu">
    <li onclick="addRemarkAbove()">上方增加备注行</li>
    <li onclick="addRemarkBelow()">下方增加备注行</li>
    <li onclick="deleteRow()">删除行</li>
    <li onclick="copyCell()">复制单元格</li>
</ul>

<script>
// ====================== Firebase 初始化 ======================
const firebaseConfig = {
  apiKey: "AIzaSyDrGttVom5wHI6fIAwfwkEZoJ80tcdwVr0",
  authDomain: "profittoolcloud.firebaseapp.com",
  projectId: "profittoolcloud",
  storageBucket: "profittoolcloud.firebasestorage.app",
  messagingSenderId: "998883168852",
  appId: "1:998883168852:web:ba39510c50bdfcf75893c1",
  measurementId: "G-N7ZSFKXEHQ"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tableRef = db.collection("table_data").doc("table");

// ====================== 全局变量 ======================
let data=[], remarks={}, collapsed={}, selectedRowIndex=null, selectedCell=null;
const cols=["日期","商品ID","商品名称","成交花费","净交易额","间接成交笔数","曝光量","点击量","平台扣点","电商税","实际利润","净利润","净利润率","预设ROI","实际ROI"];
let colWidths = { "日期":80,"商品ID":100,"商品名称":150,"成交花费":100,"净交易额":100,"间接成交笔数":80,"曝光量":80,"点击量":80,"平台扣点":80,"电商税":80,"实际利润":100,"净利润":100,"净利润率":80,"预设ROI":80,"实际ROI":80 };
let zoomScale=1.0, resizingCol=null, startX=0, startWidth=0;

// ====================== 文件导入 ======================
document.getElementById("fileInput").addEventListener("change", handleFile, false);
document.addEventListener("click", ()=>{ document.getElementById("contextMenu").style.display='none'; });
document.addEventListener("wheel", e=>{
    if(e.ctrlKey){ 
        e.preventDefault();
        zoomScale = Math.min(Math.max(zoomScale + (e.deltaY<0?0.1:-0.1),0.5),2.0);
        renderTable();
    }
},{passive:false});

function handleFile(e){
    const file=e.target.files[0];
    const reader=new FileReader();
    reader.onload=function(ev){
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        let raw=XLSX.utils.sheet_to_json(ws,{defval:""});
        data=raw.map(row=>{
            let d={};
            d["日期"]=row["日期"]||""; 
            d["商品ID"]=row["商品ID"]||""; 
            d["商品名称"]=row["商品名称"]||"";
            d["成交花费"]=parseFloat(row["成交花费(元)"]||0);
            d["净交易额"]=parseFloat(row["净交易额(元)"]||0);
            d["间接成交笔数"]=parseInt(row["间接成交笔数"]||0);
            d["曝光量"]=parseInt(row["曝光量"]||0);
            d["点击量"]=parseInt(row["点击量"]||0);
            d["平台扣点"]=0.01; 
            d["电商税"]=0.02; 
            d["实际利润"]=0;
            let fee=d["净交易额"]*0.01, tax=d["净交易额"]*0.02;
            d["净利润"]=+(0-d["成交花费"]-fee-tax).toFixed(2);
            d["净利润率"]=+((d["净利润"]/(d["净交易额"]||1))*100).toFixed(2);
            d["预设ROI"]=0; 
            d["实际ROI"]=+(d["净交易额"]/(d["成交花费"]||1)).toFixed(2);
            return d;
        });
        data.sort((a,b)=> new Date(a["日期"])-new Date(b["日期"]));
        saveToFirebase();
        renderTable();
    };
    reader.readAsBinaryString(file);
}

// ====================== 渲染表格 ======================
function renderTable(){
    const thead=document.getElementById("tableHead");
    const tbody=document.getElementById("tableBody");
    thead.innerHTML="<tr>"+cols.map(c=>`<th style="width:${colWidths[c]*zoomScale}px">${c}<div class='resizer'></div></th>`).join("")+"</tr>";
    tbody.innerHTML="";

    thead.querySelectorAll("th").forEach((th,i)=>{
        const resizer = th.querySelector(".resizer");
        resizer.onmousedown = function(e){
            resizingCol=cols[i]; startX=e.pageX; startWidth=colWidths[resizingCol];
            document.onmousemove = resizeColumn; document.onmouseup = stopResize;
        };
    });

    let fragment=document.createDocumentFragment();
    let products=[...new Set(data.map(d=>d["商品名称"]))];
    products.forEach(product=>{
        if(!(product in collapsed)) collapsed[product]=false;
        let icon=collapsed[product]?"▶":"▼";
        let tr=document.createElement("tr"); tr.className="group";
        tr.innerHTML=`<td colspan="${cols.length}">${icon} ${product}</td>`;
        tr.onclick=()=>{ collapsed[product]=!collapsed[product]; renderTable(); };
        fragment.appendChild(tr);

        if(collapsed[product]) return;

        data.filter(d=>d["商品名称"]===product).forEach(row=>{
            let idx = data.indexOf(row);
            let trData=document.createElement("tr"); trData.dataset.idx=idx;
            trData.innerHTML=cols.map(c=>{
                let val=row[c];
                if(c==='平台扣点'||c==='电商税') val=(val*100).toFixed(0)+'%';
                if(c==='净利润率') val=val.toFixed(2)+'%';
                if(c==='净利润') val=`<span class="${row["净利润"]>=0?"profit":"loss"}">${val}</span>`;
                return `<td style="width:${colWidths[c]*zoomScale}px" ${c==='实际利润'||c==='预设ROI'?'contenteditable="true"':""} ${c==='商品ID'?'onclick="copyCell(this)"':""}>${val}</td>`;
            }).join("");

            // 双击编辑计算
            trData.querySelectorAll("td").forEach((td,j)=>{
                if(cols[j]==='实际利润'||cols[j]==='预设ROI'){
                    td.addEventListener("keydown", e=>{
                        if(e.key==="Enter"){
                            e.preventDefault();
                            let val=parseFloat(td.textContent)||0;
                            if(cols[j]==='实际利润') data[idx]["实际利润"]=val;
                            if(cols[j]==='预设ROI') data[idx]["预设ROI"]=val;
                            let fee=data[idx]["净交易额"]*0.01;
                            let tax=data[idx]["净交易额"]*0.02;
                            data[idx]["净利润"]=+(data[idx]["实际利润"]-data[idx]["成交花费"]-fee-tax).toFixed(2);
                            data[idx]["净利润率"]=+((data[idx]["净利润"]/(data[idx]["净交易额"]||1))*100).toFixed(2);
                            data[idx]["实际ROI"]=+(data[idx]["净交易额"]/(data[idx]["成交花费"]||1)).toFixed(2);
                            saveToFirebase();
                            renderTable();
                        }
                    });
                }
            });

            trData.oncontextmenu=(e)=>{ e.preventDefault(); selectedRowIndex="row_"+idx; selectedCell=e.target; showContextMenu(e.pageX,e.pageY); };
            fragment.appendChild(trData);

            // 备注行
            let iid="row_"+idx;
            if(iid in remarks){
                let trRemark=document.createElement("tr"); trRemark.className="remark";
                trRemark.innerHTML=`<td colspan="${cols.length}">${remarks[iid]}</td>`;
                trRemark.ondblclick=()=>{ trRemark.querySelector("td").setAttribute("contenteditable","true"); trRemark.querySelector("td").focus(); };
                trRemark.querySelector("td").onblur=()=>{
                    remarks[iid]=trRemark.querySelector("td").textContent; saveToFirebase();
                    renderTable();
                };
                trRemark.oncontextmenu=(e)=>{ e.preventDefault(); selectedRowIndex=iid; selectedCell=trRemark.querySelector("td"); showContextMenu(e.pageX,e.pageY); };
                fragment.appendChild(trRemark);
            }
        });
    });

    tbody.appendChild(fragment);
}

// ====================== 列宽拖拽 ======================
function resizeColumn(e){
    if(!resizingCol) return;
    let delta=e.pageX-startX;
    colWidths[resizingCol]=Math.max(startWidth+delta/zoomScale,30);
    renderTable();
}
function stopResize(){ document.onmousemove=null; document.onmouseup=null; resizingCol=null; }

// ====================== 右键菜单 ======================
function copyCell(td){ if(!td) td=selectedCell; navigator.clipboard.writeText(td.textContent); alert("已复制："+td.textContent); }
function showContextMenu(x,y){ const menu=document.getElementById("contextMenu"); menu.style.left=x+"px"; menu.style.top=y+"px"; menu.style.display='block'; }
function addRemarkAbove(){ if(selectedRowIndex===null) return; remarks["row_"+Date.now()] = ""; saveToFirebase(); renderTable(); }
function addRemarkBelow(){ if(selectedRowIndex===null) return; remarks[selectedRowIndex] = ""; saveToFirebase(); renderTable(); }
function deleteRow(){ if(selectedRowIndex===null) return; let idx=parseInt(selectedRowIndex.replace("row_","")); data.splice(idx,1); if(selectedRowIndex in remarks) delete remarks[selectedRowIndex]; saveToFirebase(); renderTable(); }
function clearData(){ data=[]; remarks={}; collapsed={}; saveToFirebase(); renderTable(); }

// ====================== Firebase 实时同步 ======================
tableRef.onSnapshot(doc=>{
    if(doc.exists){
        const d=doc.data();
        data=d.data||[];
        remarks=d.remarks||{};
        renderTable();
    }
});

// ====================== 保存到 Firebase ======================
function saveToFirebase(){ tableRef.set({data:data, remarks:remarks}); }

// ====================== Excel 导出 ======================
function exportExcel(){ 
    let wb=XLSX.utils.book_new();
    let ws_data=[cols];
    data.forEach(row=>{
        ws_data.push(cols.map(c=>{
            if(c==='平台扣点'||c==='电商税') return (row[c]*100).toFixed(0)+'%';
            if(c==='净利润率') return row[c].toFixed(2)+'%';
            return row[c];
        }));
        let iid="row_"+data.indexOf(row);
        if(iid in remarks) ws_data.push([remarks[iid], ...Array(cols.length-1).fill("")]);
    });
    let ws=XLSX.utils.aoa_to_sheet(ws_data);
    XLSX.utils.book_append_sheet(wb, ws,"推广利润");
    XLSX.writeFile(wb,"推广利润数据总览.xlsx");
}
</script>
</body>
</html>
